name: The Victory Lane

on:
  schedule:
    # Runs every 5 minutes, all day, every day
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run digest script
        env:
          YAHOO_EMAIL:        ${{ secrets.YAHOO_EMAIL }}
          YAHOO_APP_PASSWORD: ${{ secrets.YAHOO_APP_PASSWORD }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_ACTIONS:     "true"
        run: python victory_lane.py

      - name: Commit and push digest
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add docs/ processed_ids.json
          git diff --staged --quiet || git commit -m "Dispatch update $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin master
          git push
