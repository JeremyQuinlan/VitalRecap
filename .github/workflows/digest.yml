name: Vital Knowledge Digest

on:
  schedule:
    # Runs every 5 minutes, 5am–7pm ET (10am–midnight UTC)
    - cron: '*/5 10-23 * * 1-5'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to push HTML to GitHub Pages

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run digest script
        env:
          YAHOO_EMAIL:        ${{ secrets.YAHOO_EMAIL }}
          YAHOO_APP_PASSWORD: ${{ secrets.YAHOO_APP_PASSWORD }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_ACTIONS:     "true"
        run: python vital_knowledge_digest.py

      - name: Commit and push digest
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add docs/ processed_ids.json
          git diff --staged --quiet || git commit -m "Digest update $(date +'%Y-%m-%d %H:%M')"
          git push
